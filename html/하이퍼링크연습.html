  <h3>하이퍼링크 a anchor</h3>
  <!-- ul>li*3 -->

    <li>하이퍼링크를 지정할 때</li>
    <li>href 속성</li>
    <li><pre>href = "URL"</pre></li>
  </ul>
  <h4>하이퍼링크 연습</h4>
  <!-- 
    url형식
    프로토콜://도메인/경로/파일명.확장자
    프로토콜://도메인/경로/
    -->
    <!--  <a href="URL" >화면에 표시될 내용</a> -->
    <a href="https://www.naver.com" title="마우스 후버시 툴팁">네이버1</a>
    <!-- 
    target 속성 값. 소대문자 구분함.
    _self    기본-생략시 적용되는 속성값
    _blank   새탭에서 열기
    -->
    <a href="https://www.naver.com" 
    title="마우스 후버시 툴팁"
    target="_blank">네이버2</a>
    <hr>
