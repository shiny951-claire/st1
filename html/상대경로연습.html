<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상대경로</title>
</head>
<body>
  <h1>상대경로</h1>
  <ul>
    <li>./ 현재디렉토리</li>
    <li> 생략 현재이렉토리</li>
    <li>../ 상위 디렉토리</li>
    <li>/ 루트디렉토리(최상위디렉토리)</li>
    <li>경로1/경로2/파일명.확장자  / -->경로폴더아래 </li>
  </ul>
  <hr>
  <h2>상대경로 연습</h2>
  <p>현재 작성중인 html문서의 위치 <br>
  최상위 밑 html폴더 밑에 상대경로연습.html <br>
  /html/상대경로 연습.html
  </p>
  <div>
    <pre>
      /
      ㄴhtml
        ㄴasset
           logo.png
        ㄴ상대경로 연습.html
    </pre>
  </div>
  <hr>
  <!-- 
  <img 
    src="url" 
    alt="
      - 검색엔진의 키워드
      - 이미지의 정보를 텍스트로 제공
      - 이미지에 문제가 발생했을 때 브라우저에 표시될 대체텍스트
      - 이미지 정보력 없으면 빈문자">
  -->
    <!-- 
    현재 html문서  /html/상대경로연습.html
    보여줄 이미지  /html/asset/logo.png
    -->
    <img src="logo.png" alt="이미지연습">
    <!-- html문서가 있는 폴더에서 logo.png 찾아서 표시-->
    <!-- 
      현재 폴더에서 밑에있는 ./
      esset폴더 밑에  asset/
      -->
    <img src="./asset/logo.png" alt="이미지연습">
    <!-- 
      /   루트
      html/ html밑
      asset/ asset밑
      logo.png  -->
    <img src="/html/asset/logo.png" alt="이미지연습">
  </body>
</html>
