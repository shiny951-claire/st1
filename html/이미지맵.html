<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- 호스팅하는 서버의 세팅이 한 글자에 2바이트를 사용함-거의 UTF-8을 사용함 -->
  <meta charset="UTF-8">
  <!-- 브라우저에 맞게 볼게요, 너비는 기기너비대로 사용할게요, 기계 초기셋팅대로 사용할게요 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지맵</title>
</head>
<body>
  <!-- 문단의 구조에서 중요한 부분을 h시리즈를 사용함. 중요 -->
  <h1>이미지에 링크하기</h1>
  <!-- 블럭레벨. 거의 hr을 써도 스타일시트로 선이 보이지 않게 사용함 -->
  <hr> 
  <!-- 인라인은 블록레벨로 감쌈. 그래야 관리가 쉬움 -->
  <!-- 태그를 감싸서 태그를 만드는  emmet : 드래그, 명령팔레트,wrap, 감쌀 태그작성후 엔터
  -->
  <div class="exam">
    <!-- <img src="asset/logo.png" alt="넣고자 하는 정보가 뭔지. 시각장애인의 장비는 이 정보를 읽어줌. 정보가 중요하지 않으면 비워두는것이 좋음">
     <img src="asset/logo.png" alt="로고">
    <img src="asset/logo.png" alt="Github">
    <img src="asset/logo.png" alt=""><-채택 -->
    <a href="https://github.com/" class="sample"><img src="asset/logo.png" alt=""></a> 
  </div>

  <h2>하나의 이미지에 여러개 링크 이미지맵</h2>
  <div class="exam">
    <!-- 하나의 이미지에 여러개의 링크를 걸 때 -->
      <img src="image-multimedia/image/imagemap-sample.jpg" alt="이미지맵연습">
      <!-- Image Map Generated by http://www.image-map.net/ <-이미지맵을 어디서 만들어줬는지 -->
      <img src="image-multimedia/image/imagemap-sample.jpg" usemap="#image-map1">
      
<!-- name속성의 이름은 문서내에 유일해야합니다. -->
<map name="image-map1">
    <area target="_blank" alt="네이버로 이동" title="네이버로 이동" href="https://www.naver.com" coords="70,352,269,502" shape="rect">
    <area target="_self" alt="깃허브로 이동" title="깃허브로 이동" href="https://github.com" coords="612,416,100" shape="circle">
    <area target="" alt="구글로 이동" title="구글로 이동" href="https://www.google.com" coords="281,202,223,266,397,365,399,272" shape="poly">
</map>

  </div>
</body>
</html>
