<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>멀티미디어삽입</title>
</head>
<body>
  <video src="image-multimedia/media/halongbay_320.mp4"></video><br>
  <video src="image-multimedia/media/halongbay_320.mp4" 
    controls></video>
  <video src="image-multimedia/media/halongbay_320.mp4" 
    controls
    poster="image-multimedia/media/halongbay_320_2_Moment.jpg"></video>
  <video src="image-multimedia/media/halongbay_320.mp4" 
    controls
    poster="image-multimedia/media/halongbay_320_2_Moment.jpg"
    muted></video>
  <video src="image-multimedia/media/halongbay_320.mp4" 
    controls
    poster="image-multimedia/media/halongbay_320_2_Moment.jpg"
    muted
    loop
  ></video>
  <!-- controls 없이 mute, autoplay
   playsinline은 IOS 호환성 때문 -->
  <video src="image-multimedia/media/halongbay_320.mp4" 
    poster="image-multimedia/media/halongbay_320_2_Moment.jpg"
    loop
    autoplay
    muted
    playsinline
  ></video>
  <hr>
  <video loop autoplay muted playsinline>
    <source src="image-multimedia/media/halongbay_320.asf">
    <source src="image-multimedia/media/halongbay_320.mp4">
    <p>지원되지 않는 브라우저입니다.</p>
  </video>
</body>
</html>
