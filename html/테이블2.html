<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테이블2</title>
</head>
<body>
  <!-- 4줄5칸  
  tr*4>td*5{내용}
  -->
  <table border="1" width="80%">
    <!-- tr*4>td*5{내용} -->
    <tr>
      <!-- 1줄 -->
      <td rowspan="2">내용</td>
      <td colspan="4">내용</td> 
      <!-- 3~5칸 코멘트화 -->
      <!-- <td>내용</td>
      <td>내용</td>
      <td>내용</td> -->
    </tr>
    <tr>
      <!-- 2row - 첫칸 코멘트화-->
      <!-- <td>내용</td> -->
      <td>지역</td>
      <td>지역</td>
      <td>지역</td>
      <td>지역</td>
    </tr>
    <tr>
      <!-- 3줄 -->
      <td rowspan="2">내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
    <tr>
      <!-- 4줄 - 첫칸 코멘트화 -->
      <!-- <td>내용</td> -->
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
  </table>

</body>
</html>
