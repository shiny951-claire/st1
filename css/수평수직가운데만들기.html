<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수평 수직 가운데 만들기</title>
  <!-- 웹폰트 불러오기 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
<!-- 

.noto-sans-kr-<uniquifier> {
  font-family: "Noto Sans KR", sans-serif;
  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
}
  .nanum-pen-script-regular {
  font-family: "Nanum Pen Script", cursive;
  font-weight: 400;
  font-style: normal;
}

-->
<style>
  *{margin: 0; padding: 0;box-sizing: border-box;}
  .exam{
    /* 브라우저 가득 사용하기 */
    width: 100%; height: 100vh;
    background-color: #ccc;
    /* 4 인라인 .text-wrap 수평정렬 */
    text-align: center;
    /* 6. 자식의 수직정렬을 가운데 */
    align-content: center;

    /* 그라디언트 */
      background:
                radial-gradient(circle at 20% 50%, cyan 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, purple 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, #e7ca0e 0%, transparent 50%),
                radial-gradient(circle at 60% 20%, magenta 0%, transparent 50%);
            position: relative;
  }
  
  .exam .text-wrap{
    /* 3 너비를 자식의 크기만큼만  */
    display: inline-block;
  }
  .exam .text-wrap .title{
    /* 1웹폰트 nanum pen script */
    font-family: "Nanum Pen Script", cursive;
    font-size: 200px;
    color:#fff;
    /* 2 자간 */
    letter-spacing: 15px;

    /* 5 텍스트 그림자 */
    text-shadow: 15px 5px 6px rgb(90 50 50 / 30%);
  }
  .exam .text-wrap .desc{
    /* 1 웹폰트 노토산스코리안 */
    font-family: "Noto Sans KR", sans-serif;
    color: #fff;
    font-size: 30px;
    margin-top: -50px;
    /* 2 자간 */
    letter-spacing: 7px;
    font-weight: 300;
  }
</style>
</head>
<body>
  <!-- .exam>.text-wrap>div.title+div.desc -->
  <div class="exam">
    <div class="text-wrap">
      <div class="title">SALE</div>
      <div class="desc">여름을 전하는 감사 인사</div>
    </div>
  </div>
</body>
</html>
