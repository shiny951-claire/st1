<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position3</title>
</head>
<body>
  <div class="wrap">
    <div class="thumb">
      <img src="images/test-img.png" alt="">
      <span class="like">좋아요</span>
      <span class="sale-box">10%</span>
    </div>
  </div>
  <style>
    *{margin: 0; padding: 0;}
    .wrap{
      margin:100px 50px;
      background-color: #cc0;
    }
    .thumb{
      background-color: #f00;
    }
    .thumb .like{
      background-color: #86f;
    }
    .thumb .sale-box{
      background-color: #f68;
    }

  /* 좋아요, 10%요소의 크기를 w50px h50px */
  .thumb span{width: 50px; height: 50px;}
  /* span 인라인레벨이라 너비, 높이 지정하지 못한 문제 해결필요 */
  .thumb span{display: block;}
  /* 좋아요, 세일박스의 위치를 지정 
  1. position:
  relative, absorlute, fixed
  ㅣ2.left/right/top/bottom */
  .thumb span{
    position: absolute;
  }
  
  /* 가까운 조상중에 position(static제외한)이 설정되어 있는 요소 기준을 지정 */
  .thumb{
    position:relative;
    /* normal flow에서 벗어나지 않고 absolute의 기준요소 */
  }
    /* 좋아요는 이미지의 왼쪽 위를 기준으로 위치 */
    .thumb span.like{
      left:10px; top:10px;
    }
    /* sale-box는 이미지의 오른쪽 위를 기준으로 위치 */
    .thumb span.sale-box{
      right:10px; top:10px;
    }
    /* .thumb크기를 부모의 요소의 4단으로 오게 하고 싶어요 */
    .thumb{      width: 25%;    }
    /* 이미지가 커서 .thumb보다 커진 문제가 생김 */
    .thumb img{width: 100%;}/*부모의 컨텐츠 영역을 다 사용할거예요*/
    /* img요소는 인라인 요소라서 태그와 태그사이의 줄바꿈을 한 글자로 인식하는 문제발생 */
    .thumb img{
      display: block;
    }
  </style>
</body>
</html>
