<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가상클래스 hover</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body{
        margin: 30px;
      }
      .product,
      .product > div {
        box-sizing: border-box;
      }
      .product {
        width: 300px;
        padding: 30px;
        /* background-color: #ccc; */
        margin-bottom: 30px;
      }
      .product .thumb {
        background-color: #ffe;
        min-height: 200px;
        margin-bottom: 30px;
      }
      .product .desc {
        background-color: #68f;
      }
      

      .product:hover .thumb{
        box-shadow: 0px 0px 20px rgba(30, 75, 40,0.4);
      }
      /* 가상클래스는 웹에서 자주 발생하는 상태를 선택자
      :hover 마우스를 어떤 요소 위에 올려둔 상태 */
      /*  */
      /* 선택자
      마우스를 상품설명이나 상품이미지에 위치시키면
      상품이미지에 그림자가 표시
      마우스를 요소에 위치시키면: hover
        요소->상품이미지(.thumb), 상품설명(.desc)
            ->.thumb, .desc부모인  =>  .product
        동작->상품이미지(.thumb)에 그림자표시(box-shadow)
      */
      /* 지시요청을 할 때는 지시대명사를 하는게 아니라 구체적으로 무엇이 어떤형태로 표시되길 원하는지 정확히 이야기 하는것이 좋음 */
    </style>
  </head>
  <body>
    <!-- ul>li*2.product>div.thumb+div.desc -->
    <ul>
      <li class="product">
        <div class="thumb">이미지</div>
        <div class="desc">상품설명</div>
      </li>
      <li class="product">
        <div class="thumb">이미지</div>
        <div class="desc">상품설명</div>
      </li>
    </ul>
  </body>
</html>
