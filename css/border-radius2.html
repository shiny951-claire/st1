<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>border-radius</title>
  <style>
    *{margin: 0; padding: 0;}
    body{
      margin: 50px;
    }
    .box{
      width: 300px;
      height: 400px;
      border: 1px solid #000;
      border-radius: 50px;
      overflow: hidden;
    }
    .child{
      background-color: 
      rgba(245, 221, 9, 0.502); /*rrggbb rgba(alpha:투명도)*/
      height: 100%;/*부모를 기준으로 %로 표시*/
    }
    /* 자식의 크기가 부모크기를 넘쳐날 때
    overflow */
  </style>
</head>
<body>
  <div class="box">
    <div class="child">Lorem ipsum dolor sit amet consectetur adipisicing elit. Molestias deleniti quos labore molestiae ipsam cupiditate est aperiam nulla itaque illum!</div>
  </div>
  
</body>
</html>
