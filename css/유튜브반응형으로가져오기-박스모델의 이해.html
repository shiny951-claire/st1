<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유튜브 반응형으로 가져오기 - 박스모델의 이해</title>
  <style>
    *{margin:0;padding:0;}
    body{margin: 50px;}
    /* 부모의 너비를 따르지만 768px 이상은 되지 마라 */
    .media-box{
      max-width: 768px; background-color: #bbb;}
    .media-box .iframe-wrap{
      background-color: #ccf;
      width: 500px; 
      /* 해당요소의 콘텐츠 영역의 수직크기는 0 */
      height: 500px;
      padding-top: 500px;
      box-sizing: border-box;
      /* overflow: hidden; */
      /* .iframe-wrap .box{의 기준요소 잡기 */
      position: relative;
    }

    .iframe-wrap .box{
      opacity: 0.5;
      background-color: #f00;
      /*부모의 컨텐츠 영역을 전부사용하겠다*/
      /* width: 100%;    height: 100%; */
      /* 
      기준: 가까운 조상 중 position: static 제외한 설정값이 있는 요소0,0을 잡아주는 요소
      일반흐름: 벗어나요 */
      position: absolute;
      left: 0;  top: 0;
      /* 기준요소의 콘텐츠영역을 사용- 조상중에 기준포지션을 주지 않으면 body의 영역 전체를 사용하게 됨 */
      width: 100%;    height: 100%;
    }
  </style>
</head>
<body>
  <div class="media-box">
    <div class="iframe-wrap">
      <div class="box">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Quos, vero dolore. Nobis eaque veritatis repudiandae eum. Vero tenetur minus aut. Repudiandae numquam molestias illum iusto, debitis ratione dicta. Eum, consequatur.</div>
    </div>
  </div>
</body>
</html>
