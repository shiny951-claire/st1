<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>media query2</title>
  <style>
    *{margin: 0; padding: 0;}
    ol,ul{list-style: none;}
    a:link,
    a:visited,
    a:active{
      color:currentColor;
      text-decoration: underline;
    }
    a:hover{color:#f00; text-decoration: underline;}
    
    header{
      background-color: #ccc;
    }
    header .inner{
      width: 90%;
      max-width: 1400px;
      margin: 0 auto;
      background-color: #6cc;
    }
    /* .inner의 자식요소들의 float 지정으로 인해 인식못하는 문제 해결 */
    header .inner::after{
      content: "";
      display: block;
      clear:both;
    }
    /* 
    1. 블록레벨 logo gnb-wrap util m-nav-btn 한줄로 표시
    */
    header .logo,
    header .gnb-wrap{
      float:left;
    }
    header .util,
    header .m-nav-btn{
      float:right;
    }

    /* 2. gnb메뉴가 한 줄로 표시 */
    header .gnb-wrap{
      background-color: #cfc;
      margin-left: 50px;
    }
    header .gnb-wrap ul.gnb{}
    /* 블럭레벨인 li를 옆으로 나란히 */
    header .gnb-wrap .gnb li{
      display: inline-block;
      padding:0.5em 1em;
      background-color: #fff;
      margin-right: 1em;
    }
    header .gnb-wrap .gnb li a{}

    header .util{
      background-color: bisque ;
    }
    header .util a{
      /*인라인은 수직에 관련한 서식이 잘 먹지 않음*/
      display: inline-block;
      padding:0.5em 1em;
      background-color: #fff;
      margin-left: 1em;
    }
    /* 3. 햄버거메뉴를 1024이상에서는 표시하지 않고 1024 이하에서는 표시 */
    header .m-nav-btn{
      display: none;

    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="inner">
        <h1 class="logo">RAN</h1>
        <nav class="gnb-wrap">
          <ul class="gnb">
            <!-- li*5>a>{menu$}  li는 블록레벨-->
            <li><a href="">menu1</a></li>
            <li><a href="">menu2</a></li>
            <li><a href="">menu3</a></li>
            <li><a href="">menu4</a></li>
            <li><a href="">menu5</a></li>

          </ul>
        </nav>
        <!-- div.util>a*3>{상단기능메뉴$} -->
        <div class="util"><!--줄바꿈하면 공백으로 인식함-->
          <a href="">상단기능메뉴1</a><a href="">상단기능메뉴2</a><a href="">상단기능메뉴3</a>
        </div>
        <!-- //.util -->
         <div class="m-nav-btn">
          <img src="images/menu.png" alt="모바일 사이드 메뉴 펼치기">
         </div>

      </div>
      <!-- //.inner -->
    </header>
  </div>
  <!-- //.wrap -->
</body>
</html>
