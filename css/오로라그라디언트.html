<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오로라 메시 그라디언트</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #08030d;
    }

    .exam {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at 20% 15%, rgba(0, 255, 255, 0.34), transparent 24%),
                  radial-gradient(circle at 80% 20%, rgba(231, 202, 14, 0.45), transparent 20%),
                  radial-gradient(circle at 50% 40%, rgba(255, 0, 255, 0.38), transparent 18%),
                  radial-gradient(circle at 70% 75%, rgba(126, 0, 255, 0.32), transparent 24%),
                  linear-gradient(135deg, rgba(14, 36, 84, 0.95), rgba(8, 3, 13, 0.95));
    }

    .exam::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 25%, rgba(0, 255, 255, 0.35), transparent 18%),
        radial-gradient(circle at 70% 18%, rgba(255, 0, 255, 0.28), transparent 16%),
        radial-gradient(circle at 28% 78%, rgba(231, 202, 14, 0.32), transparent 20%),
        radial-gradient(circle at 82% 62%, rgba(126, 0, 255, 0.22), transparent 24%);
      filter: blur(40px);
      transform: scale(1.15);
    }

    .exam::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 30% 10%, rgba(255, 255, 255, 0.12) 0%, transparent 14%),
                        radial-gradient(circle at 60% 80%, rgba(255, 255, 255, 0.08) 0%, transparent 15%);
      opacity: 0.55;
      pointer-events: none;
    }

    .exam .content {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      text-align: center;
      padding: 2rem;
    }

    .exam .content h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 5rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(0, 0, 0, 0.35);
    }

    .exam .content p {
      margin-top: 1rem;
      font-size: 1.1rem;
      max-width: 720px;
      line-height: 1.6;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
  <div class="exam">
    <div class="content">
      <h1>GRADIENT OVER DESIGN</h1>
      <p>여기에 선명한 텍스트를 넣을 수 있도록 배경과 분리된 레이어로 작성했습니다.</p>
    </div>
  </div>
</body>
</html>
