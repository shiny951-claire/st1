<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오로라 그라디언트</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .exam {
            width: 100%;
            height: 100vh;
            background:
                radial-gradient(circle at 20% 50%, cyan 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, purple 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, #e7ca0e 0%, transparent 50%),
                radial-gradient(circle at 60% 20%, magenta 0%, transparent 50%);
            position: relative;
        }
        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2em;
            text-align: center;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="exam"></div>
    <div class="text">
        <h1>오로라 그라디언트</h1>
    </div>
</body>
</html>
