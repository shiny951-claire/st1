<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter</title>
  <style>
    *{margin: 0;padding: 0;}
    .wrap{}
    .visual-section{
      /* 100vw: 스크롤바를 합친 크기를 사용 */
      /* viewport의 크기를 다 사용 */
      width: 100%;
      height: 100vh;
      background-color: #97948d;
      background-size: auto 200vh;
      /* inline-block의 정렬은 부모에게 */
      /* text-align: center; */
      align-content: center;
      /* .visual-section::after 기준요소를 위해 */
      position: relative;
      text-align: right;
    }
    .img-wrap{
      height: 100%;
      display: inline-block;
    }
    .img-wrap img{
      height: 100%;
      display: block;/*맨 밑의 아주 작은 여백 없앰*/
      filter:blur(5px) grayscale(100%);
    }
  </style>
</head>
<body>
  <div class="visual-section">
    <div class="img-wrap">
      <img src="../images/background-test.jpg" alt="">
    </div>
    <div class="text-wrap"></div>
  </div>
</body>
</html>
