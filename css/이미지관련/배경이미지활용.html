<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배경이미지 활용</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
<!-- 

.noto-sans-kr-<uniquifier> {
  font-family: "Noto Sans KR", sans-serif;
  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
}
  .nanum-pen-script-regular {
  font-family: "Nanum Pen Script", cursive;
  font-weight: 400;
  font-style: normal;
}

 -->

  <style>
    *{margin: 0;padding: 0;}
    .wrap{}
    .visual-section{
      /* 100vw: 스크롤바를 합친 크기를 사용 */
      /* viewport의 크기를 다 사용 */
      width: 100%;
      height: 100vh;
      background-color: #97948d;
      background-image: url(../images/background-test.jpg);
      /* background-image: url(다른이미지 넣어서 배경화면만 변경 가능); */
      background-repeat: no-repeat;
      background-position: right top;
      background-size: auto 200vh;
      /* inline-block의 가운데정렬은 부모에게 */
      text-align: center;
      align-content: center;
      /* .visual-section::after 기준요소를 위해 */
      position: relative;
    }
    .visual-section::after{
      content: "";
      display: block;
      background-color: rgba(0, 255, 255, 0.5);
      width: 100%; height: 100%;
      /* z-index 레이어 순서관리*/
      position: absolute;
      left: 0; top: 0;
      z-index: 10;
    }

    .visual-section .text-wrap{
      /* z-index레이어 순서 관리 */
      position: relative;
      z-index: 20;
      display: inline-block;
      width: 50%;
      padding: 1rem 2rem;
      /* margin: 0 auto; 인라인이라 정렬안됨*/
      background-color: rgba(0, 0, 0, 0.8);
      font-family: "Noto Sans KR", sans-serif;
      color:rgb(90, 238, 41);
    }
    .visual-section .text-wrap .title{
      /* font-family: "Noto Sans KR", sans-serif; */
      font-size: 4rem;
      font-weight: 100;
      /* font-color:#fff; */
    }
    .visual-section .text-wrap .desc{
      /* font-family: "Noto Sans KR", sans-serif; */
      font-size: 1rem;
      font-weight: 200;
      /* font-color:#fff; */
    }

  </style>
</head>
<body>
  <div class="wrap">
    <div class="visual-section">
      <!-- .text-wrap>p.title>lorem3^p.desc>lorem20 -->
      <div class="text-wrap">
        <p class="title">Lorem, ipsum dolor.</p>
        <p class="desc">Lorem ipsum dolor sit amet consectetur, adipisicing elit. <br>Odit minus exercitationem deserunt error labore sint unde ex. Perferendis, architecto vero.</p>
      </div>
    </div>
  </div>
</body>
</html>
