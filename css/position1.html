<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position1</title>
  <style>
    *{margin: 0; padding:0; box-sizing: border-box;}
    .wrap{
      width: 65%; min-height: 2000px;
      margin:0 auto;
      background-color: #ccc;
      padding: 30px;
      border: 10px dashed #999;
      position: relative;/*3번째 parent 기준요소*/
    }
    .parent{
      padding: 10px;}
      
    
    .parent:nth-child(1){
      background-color: #f86;
      position:static;
      /* 기준 없음.  */
      /* 일반흐름 normal flow. 다른부분에 영향 없음 */
      /* 레이어 개념 없음 z-index*/
      left: 150px; top:150px;

    }
    .parent:nth-child(2){
      background-color: #6f8;
      position: relative;
      /* 기준은 자신 */
      /* 형제와 부모에게 레이아웃의 영향을 안줌-normal flow */
      /* 레아어 개념 있음 */
      left: 150px; top:150px;
      

    }
    .parent:nth-child(3){
      background-color: #86f;
      position:absolute;
      /* 기준을 가까운 조상의 position:static을 제외한 값으로 */
      /* 형제 부모의 레이아웃에 영향을줌 - normal flow X */
      /* 부모자식의 관계를 잃음
      부모가 해당 요소의 높이를 인식하지 못함
      부모의너비를 알지 못함 */
      /* 레이어 요소가 됨. z-index */
      /* left/right/top/bottom을 지정하지 않으면 원래 자기 위치 */
      left:0; top: 0;
    }
    .parent:nth-child(4){
      background-color: #cf6;
      /* 기준을 브라우저 */
      /* 형제 부모의 레이아웃에 영향을줌 - normal flow X */
      /* 부모자식의 관계를 잃음
      부모가 해당 요소의 높이를 인식하지 못함
      부모의너비를 알지 못함 콘텐츠 영역만큼의 너비*/
      /* 레이어 요소가 됨. z-index */
      /* left/right/top/bottom을 지정하지 않으면 원래 자기 위치 */
      position: fixed;
      left:0; top: 0;
        }
    .parent:nth-child(5){
      background-color: #c8f;
    
    }
    .parent .child{
      width: 50px;
      height: 50px;
      padding:10px;
      position:absolute;
      /* normal flow에서 벗어남
        부모가 해당요소의 높이를 인식하지 못함 
        본인은 부모의 콘텐츠의 영역으로 가져오지 못함
        자신의 콘텐츠 크기만큼의 너비로 줄어들음
        기준요소?
        가까운 조상부터 position이 설정된 요소(단, static제외)*/
        left: 0; top: 0;
    }
    .parent .child:nth-child(1){
      background-color: #fff;
    }
    .parent .child:nth-child(2){
      background-color: #0dd;
    }
    .box{
      background-color: #dd0;
    }
    /* 요소의 위치 설정 법 지정 position */
    .parent:nth-child(5) .child
    {
      position: static;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- .parent*5>.child*2>.box>{box$} -->
    <div class="parent">
      <div class="child">
        <div class="box">box1</div>
      </div>
      <div class="child">
        <div class="box">box2</div>
      </div>
    </div>
    <div class="parent">
      <div class="child">
        <div class="box">box1</div>
      </div>
      <div class="child">
        <div class="box">box2</div>
      </div>
    </div>
    <div class="parent">
      <div class="child">
        <div class="box">box1</div>
      </div>
      <div class="child">
        <div class="box">box2</div>
      </div>
    </div>
    <div class="parent">
      <div class="child">
        <div class="box">box1</div>
      </div>
      <div class="child">
        <div class="box">box2</div>
      </div>
    </div>
    <div class="parent">
      <div class="child">
        <div class="box">box1</div>
      </div>
      <div class="child">
        <div class="box">box2</div>
      </div>
    </div>
  </div>
</body>
</html>
